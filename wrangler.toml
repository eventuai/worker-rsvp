name = "worker-rsvp"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Liquid view templates, read internally via the VIEWS binding. The Worker runs
# first for every request, so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# ── Published content ─────────────────────────────────────────────────────────
# The SAME database worker-cms publishes to (its PUBLISHED_DB / "cms-published",
# also bound by worker-web). Reads are parameterized SELECTs (src/published.ts).
# The ONLY writes are insert-only rsvp_response / rsvp_registration rows with
# negative ids (src/submissions.ts) — never UPDATE/DELETE, never rows the CMS
# minted — so a CMS republish can never overwrite a submission and vice versa
# (contract: worker-cms src/publish/README.md; worker-cms recognizes each
# live-only uuid as a submission and mirrors it into draft). The schema is OWNED by worker-cms
# (cms/migrations/published) — deliberately no `migrations_dir` here so this
# Worker can never re-migrate the shared database.
[[d1_databases]]
binding = "PUBLISHED_DB"
database_name = "cms-published"
database_id = "94cc01db-8028-48eb-923f-e440423aeb3f"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "worker-cms-media"

# Two secrets, two roles (do not mix them up):
#
# EVENTS_SIGN_KEY — cms-plugin-events' PUBLIC-TOKEN signKey. Verifies the signed
# RSVP + unsubscribe links it mints and signs the check-in QR payloads. Copy it
# from the tenant record in that plugin's TENANTS KV (`signKey` field, falling
# back to `secret` when unset), or its SIGN_KEY/PLUGIN_SECRET env in legacy
# single-tenant installs. Same value as cms-plugin-checkin's EVENTS_PLUGIN_SECRET.
#   wrangler secret put EVENTS_SIGN_KEY
#
# EVENTS_PLUGIN_SECRET — the PAIRWISE CMS↔events-plugin secret (generated by
# worker-cms, shown under Plugins → events → Shared secret; equals the tenant
# record's `secret`). Used ONLY by the unsubscribe write-back to authenticate
# against {CMS_URL}/__cms/* as the events plugin.
#   wrangler secret put EVENTS_PLUGIN_SECRET

[vars]
# Base URL of the CMS Worker — used ONLY by the unsubscribe write-back
# ({CMS_URL}/__cms/*, src/unsubscribe.ts). RSVP submits and registrations
# never call the CMS: they insert rows into PUBLISHED_DB (src/submissions.ts).
CMS_URL = "https://cms.eventuai.com"
# Public origin serving the check-in QR links (cms-plugin-checkin's
# /checkin/{listId}/{guestId}/{sig} routes) embedded by rsvp-qrcode blocks.
# Leave unset to fall back to a bare signed token in the QR.
# CHECKIN_BASE_URL = "https://checkin.eventuai.com"
# Base URL of the cms-plugin-ticket Worker — the /ticket/buy and /ticket/order
# pages render data from its /api/* endpoints (signatures in the visitor's URL
# authenticate every call, so no secret is shared with this Worker).
# TICKET_PLUGIN_URL = "https://ticket.eventuai.com"
