name = "worker-rsvp"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Liquid view templates, read internally via the VIEWS binding. The Worker runs
# first for every request, so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# ── Published content (read-only) ─────────────────────────────────────────────
# The SAME database worker-cms publishes to (its PUBLISHED_DB / "cms-published",
# also bound by worker-web). The RSVP form only ever issues SELECTs against it
# (src/published.ts); the schema is OWNED by worker-cms (cms/migrations/published)
# — deliberately no `migrations_dir` here so this Worker can never mutate or
# re-migrate the shared database.
[[d1_databases]]
binding = "PUBLISHED_DB"
database_name = "cms-published"
database_id = "94cc01db-8028-48eb-923f-e440423aeb3f"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "worker-cms-media"

# RSVP links are minted and HMAC-signed by cms-plugin-events with ITS
# PLUGIN_SECRET. Verifying them here (and performing the interim submit
# write-back as that plugin) needs a COPY of that secret — same pattern as
# cms-plugin-checkin's EVENTS_PLUGIN_SECRET:
#   wrangler secret put EVENTS_PLUGIN_SECRET

[vars]
# Base URL of the CMS Worker — where the INTERIM submit write-back reaches the
# F1 API ({CMS_URL}/__cms/*) to update the draft guest page. GET requests never
# touch it. (Response storage is an open decision — see cms-to-rsvp.md §9.2 B.1.)
CMS_URL = "https://cms.eventuai.com"
# Public origin serving the check-in QR links (cms-plugin-checkin's
# /checkin/{listId}/{guestId}/{sig} routes) embedded by rsvp-qrcode blocks.
# Leave unset to fall back to a bare signed token in the QR.
# CHECKIN_BASE_URL = "https://checkin.eventuai.com"
# Base URL of the cms-plugin-ticket Worker — the /ticket/buy and /ticket/order
# pages render data from its /api/* endpoints (signatures in the visitor's URL
# authenticate every call, so no secret is shared with this Worker).
# TICKET_PLUGIN_URL = "https://ticket.eventuai.com"
